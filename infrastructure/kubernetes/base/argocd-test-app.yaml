apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-test-argocd
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/imperfect0007/GitOps-Multi-Tenant-SaaS-Deployment-Platform.git
    targetRevision: main
    path: infrastructure/kubernetes/base
    directory:
      include: "test-nginx-deployment.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

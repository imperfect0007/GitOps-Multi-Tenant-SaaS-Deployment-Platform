apiVersion: v1
kind: ResourceQuota
metadata:
  name: tenant-a-quota
  namespace: tenant-a
  labels:
    tenant: tenant-a
spec:
  hard:
    pods: "5"
    requests.cpu: "2"
    requests.memory: 2Gi
    limits.cpu: "4"
    limits.memory: 4Gi
    services: "5"
    configmaps: "10"
    secrets: "10"
    persistentvolumeclaims: "3"

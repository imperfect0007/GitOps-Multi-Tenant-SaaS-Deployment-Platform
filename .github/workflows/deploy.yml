# Day 9: CI/CD Pipeline — Build, Push, and optional GitOps update
# Trigger: push to main
# Secrets: DOCKER_USERNAME, DOCKER_PASSWORD
# Optional (for GitOps update): GITOPS_REPO_URL, GITOPS_TOKEN

name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  BACKEND_IMAGE: backend
  FRONTEND_IMAGE: frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-gitops:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ secrets.GITOPS_TOKEN != '' && secrets.GITOPS_REPO_URL != '' }}

    steps:
      - name: Clone GitOps repo
        run: |
          # GITOPS_REPO_URL = owner/repo (e.g. imperfect0007/gitops-repo)
          git clone "https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/${{ secrets.GITOPS_REPO_URL }}.git" gitops-repo
          cd gitops-repo && git config user.name "github-actions[bot]" && git config user.email "actions@github.com"

      - name: Update backend image in GitOps manifest
        run: |
          REPO="${{ secrets.DOCKER_USERNAME }}"
          IMAGE="${REPO}/backend:latest"
          DIR=gitops-repo/infrastructure/platform-backend
          mkdir -p "$DIR"
          if [ -f "$DIR/deployment.yaml" ]; then
            sed -i "s|image:.*|image: ${IMAGE}|" "$DIR/deployment.yaml"
          else
            printf 'apiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: platform-backend\n  namespace: default\nspec:\n  replicas: 1\n  selector:\n    matchLabels:\n      app: platform-backend\n  template:\n    metadata:\n      labels:\n        app: platform-backend\n    spec:\n      containers:\n        - name: backend\n          image: %s\n          ports:\n            - containerPort: 8000\n' "$IMAGE" > "$DIR/deployment.yaml"
          fi

      - name: Commit and push GitOps changes
        run: |
          cd gitops-repo
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: update platform-backend image"
            git push
          fi
